<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Accessibility Analyzer</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            width: 400px;
            max-height: 600px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 0;
            margin: 0;
            color: #1a202c;
        }

        h3 {
            margin: 0;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 16px;
            font-weight: 600;
        }

        .controls {
            padding: 12px;
            background: #f7fafc;
            border-bottom: 1px solid #e2e8f0;
        }

        button {
            width: 100%;
            padding: 10px 16px;
            margin-bottom: 6px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        #analyze-btn {
            background: #667eea;
            color: white;
        }

        #analyze-btn:hover {
            background: #5568d3;
        }

        #clear-btn {
            background: #e2e8f0;
            color: #4a5568;
        }

        #clear-btn:hover {
            background: #cbd5e0;
        }

        #status {
            padding: 12px;
            font-size: 13px;
            color: #4a5568;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            line-height: 1.5;
        }

        .count {
            display: inline-block;
            margin-left: 8px;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .count.critical {
            background: #fee;
            color: #c53030;
        }

        .count.serious {
            background: #fef5e7;
            color: #c05621;
        }

        .count.moderate {
            background: #fef3c7;
            color: #92400e;
        }

        #results {
            max-height: 440px;
            overflow-y: auto;
            padding: 12px;
        }

        .no-issues {
            text-align: center;
            padding: 32px 16px;
            color: #38a169;
            font-weight: 500;
        }

        .issue {
            border-left: 4px solid #f59e0b;
            padding: 10px 12px;
            margin-bottom: 10px;
            font-size: 12px;
            background: #fffbeb;
            border-radius: 4px;
        }

        .issue--critical {
            border-color: #dc2626;
            background: #fef2f2;
        }

        .issue--serious {
            border-color: #ea580c;
            background: #fff7ed;
        }

        .issue--moderate {
            border-color: #f59e0b;
            background: #fffbeb;
        }

        .issue-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }

        .badge {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 3px 6px;
            border-radius: 3px;
            letter-spacing: 0.5px;
        }

        .badge--critical {
            background: #dc2626;
            color: white;
        }

        .badge--serious {
            background: #ea580c;
            color: white;
        }

        .badge--moderate {
            background: #f59e0b;
            color: white;
        }

        .issue-type {
            font-size: 10px;
            color: #6b7280;
            font-family: monospace;
        }

        .issue-message {
            margin: 4px 0;
            color: #1a202c;
            font-weight: 500;
            line-height: 1.4;
        }

        .issue-fix {
            margin: 6px 0 4px;
            color: #4a5568;
            font-size: 11px;
            line-height: 1.4;
        }

        .issue-element {
            margin: 4px 0 0;
            font-size: 10px;
            font-family: monospace;
            color: #6b7280;
            background: #f1f5f9;
            padding: 3px 6px;
            border-radius: 3px;
            display: inline-block;
        }
    </style>
</head>

<body>
    <h3>Accessibility Analyzer</h3>
    <div class="controls">
        <button id="analyze-btn">Analyze Page</button>
        <button id="clear-btn">Clear Highlights</button>
    </div>
    <div id="status"></div>
    <div id="results"></div>
    <script src="popup.js"></script>
</body>

</html>
